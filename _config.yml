title: "77agspin"
title_separator: " - "
description: "Portal informasi dan sumber daya 77agspin — panduan, berita, dan tautan terpercaya."
url: "https://77agspin.aiot.com"
official_site: "https://77agspin.com"
baseurl: ""
lang: id_ID
timezone: Asia/Jakarta
markdown: gfm
remote_theme: pages-themes/midnight

permalink: /blog/:title/

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - .bundle/
  - .git/
  - README.md

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-redirect-from
  - jekyll-gist
  - jekyll-paginate
  - jekyll-avatar
  - jemoji
  - jekyll-mentions
  - jekyll-relative-links
  - jekyll-optional-front-matter
  - jekyll-readme-index
  - jekyll-default-layout
  - jekyll-titles-from-headings
  - jekyll-include-cache
  - jekyll-octicons
  - jekyll-coffeescript
  - jekyll-commonmark-ghpages

paginate: 5
paginate_path: "/blog/page:num/"
logo: "/assets/images/logo.svg"
image: "/assets/images/og-default.svg"

feed:
  path: atom.xml
  posts_limit: 10

twitter:
  card: summary_large_image

relative_links:
  enabled: true
  collections: true

title_from_headings:
  enabled: true
  collections: true
  pages: true

author:
  name: "77agspin"
  url: "https://77agspin.aiot.com"

defaults:
  - scope:
      path: ""
    values:
      layout: default
      image: "/assets/images/og-default.svg"
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: post
      author: "77agspin"
      image: "/assets/images/og-default.svg"

github:
  is_project_page: false
